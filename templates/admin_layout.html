<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "Admin Panel" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/jpg" href="/static/images/god.jpg"/>
    <style>
        body {
            background-color: #1a1a1a;
            color: #28a745;
            
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            left: 0;
            top: 0;
            background: #1a1a1a;
            padding-top: 20px;
            
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: #bbb;
            text-decoration: none;
            font-size: 15px;
        }

        .sidebar a:hover, .sidebar a.active {
            background: #28a745;
            color: white;
            border-radius: 5px;
        }

        .content-area {
            margin-left: 260px;
            padding: 20px;
            
        }

        .card-custom {
            background: #3b3b3b;
            color: white;
            border-radius: 12px;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center text-success mb-4"  style="color:#28a745;">Admin Panel</h4>

    <a href="{{ url_for('admin_dashboard') }}" class="{% if active=='dashboard' %}active{% endif %} fw-bold">📊 Dashboard</a>
    <a href="{{ url_for('admin_users') }}" class="{% if active=='users' %}active{% endif %} fw-bold">👤 Users</a>
    <a href="{{ url_for('admin_owners') }}" class="{% if active=='owners' %}active{% endif %} fw-bold">🧑‍💼 Owners</a>
    <a href="{{ url_for('admin_turfs') }}" class="{% if active=='turfs' %}active{% endif %} fw-bold">⚽ Turfs</a>
    <a href="{{ url_for('admin_reviews') }}" class="{% if active=='reviews' %}active{% endif %} fw-bold">⭐ Reviews</a>
    <a href="{{ url_for('admin_analytics') }}" class="{% if active=='analytics' %}active{% endif %} fw-bold">📈 Analytics</a>
    


    

    <hr class="bg-secondary">

    <a href="{{ url_for('logout') }}" class="text-danger fw-bold">🚪 Logout</a>
</div>

<!-- Content -->
<div class="content-area">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
